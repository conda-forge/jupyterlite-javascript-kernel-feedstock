# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.4.0a1"
  python_check_max: "3.14"
  jupyterlab_min: "4.5.5"
  jupyterlab_max: "4.6"
  jupyterlite_core_min: "0.7.0"
  jupyterlite_core_max: "0.8.0"
  js_name: "@jupyterlite/javascript-kernel-extension"
  # derived
  js_version: ${{ version | replace("a", "-alpha.") | replace("b", "-beta.") | replace("rc", "-rc.") }}
  # utils
  grep: ${{ "grep -iE" if unix else "findstr /c" }}
  cat: ${{ "cat" if unix else "type" }}
  ls: ${{ "ls" if unix else "dir" }}

package:
  name: jupyterlite-javascript-kernel
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyterlite-javascript-kernel/jupyterlite_javascript_kernel-${{ version }}.tar.gz
  sha256: d3abe9d30a7207a1a8e971773b4964e1e29c789c4f7c59d499d0684e6195e12c

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - hatch-jupyter-builder >=0.5
    - hatch-nodejs-version >=0.3.2
    - hatchling >=1.5.0
    - jupyterlab ${{ jupyterlab_min }}.*
    - pip
    - python ${{ python_min }}.*
  run:
    - python >=${{ python_min }}
  run_constraints:
    - jupyterlite-core >=${{ jupyterlite_core_min }},<${{ jupyterlite_core_max }}
    - jupyterlab >=${{ jupyterlab_min }},<${{ jupyterlab_max }}

tests:
  - python:
      imports: jupyterlite_javascript_kernel
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
        - jupyterlite-core-with-lab
        - jupyterlab
    script:
      - python -c "print(__import__('jupyterlite_javascript_kernel').__version__)" | ${{ grep }} "^${{ version | replace('.', '\\.') }}$"
      - jupyter labextension list 2>&1 | ${{ grep }} "${{ js_name }}.*${{ js_version | replace('.', '\\.') }}.*OK"
      - jupyter lite build
      - ${{ ls }} "_output/extensions/${{ js_name }}/package.json"
      - ${{ cat }} _output/jupyter-lite.json | ${{ grep }} "${{ js_name }}"

about:
  summary: A JavaScript kernel for JupyterLite
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - jupyterlite_javascript_kernel/labextension/static/third-party-licenses.json
  homepage: https://pypi.org/project/jupyterlite-javascript-kernel
  repository: https://github.com/jupyterlite/javascript-kernel
  documentation: https://jupyterlite-javascript-kernel.readthedocs.io

extra:
  recipe-maintainers:
    - bollwyvl
    - conda-forge/jupyterlite-core
